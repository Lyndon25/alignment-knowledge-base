    abstract_cn: "本文提出表征工程（Representation Engineering, RepE），一种自上而下的AI透明度与安全研究方法。不同于传统的自下而上机制可解释性，RepE直接从神经网络的高层表征入手，通过读取（reading）和操控（control）表征向量来实现对模型行为的监测与调节。文章系统定义了RepE的三段式流水线：表征识别→表征操作化→表征控制，并在一系列任务上展示了其有效性，包括诚实性检测、权力寻求倾向评估、安全性增强等。RepE范式将激活工程从临时的技术手段提升为系统化的方法论框架，为后续的激活添加（ActAdd）、对比激活工程（CAE）等工作提供了概念基础。",

    abstract_cn: "本文介绍对比激活添加（Contrastive Activation Addition, CAA），一种在推理时通过向模型的残差流添加对比性激活差异来控制语言模型行为的方法。CAA的核心思路是：收集模型在处理一对对比提示（如有害/无害）时的激活值，计算两者之间的差异向量，然后将该向量乘以一个缩放系数后添加到目标层的残差流中。作者在Llama 2的多个尺度（7B、13B、70B）上展示了CAA的有效性，成功地在不进行任何微调的情况下控制了模型的拒绝（refusal）行为和有害输出。该方法计算成本低，无需标注大规模数据，且对模型的一般能力影响极小。",

    findings: "核心发现：(1) 简单的线性激活加法即可有效控制大模型行为，无需微调；(2) 拒绝向量（refusal vector）可显著降低模型对有害请求的拒绝率，也可反向增强安全性；(3) CAA的效果随模型规模增大而有所减弱（负向steering更明显）；(4) 中间层（约0.3-0.7总层数）的steering效果最佳；(5) 方法计算效率极高，仅需少量对比样本即可构建有效向量。",

    abstract_cn: "本文首次将activation steering中的'附带损伤'——即steering操作对非目标特征方向的无意影响——形式化为一个可量化的优化问题。作者证明，标准的steering方法（如Activation Addition和Angular Steering）都存在不可忽视的附带损伤：它们不仅改变了目标特征方向上的激活，还间接扭曲了其他语义方向。COAST（Collateral-damage-Optimized Activation STeering）通过在经验二阶矩矩阵的约束下最小化期望附带变化来解决此问题：找到的steering方向在有效操控目标行为的同时，最小化与其他激活方向的内积加权和。实验结果显示，COAST的Attack Success Rate比Angular Steering低30%，且下游任务准确率比ActAdd高20%。本文还提出了一个诊断附带损伤的理论框架，可用于评估任何steering方法的副作用。",
    methodology: "首先形式化定义附带损伤：给定激活a和目标方向d，steering向量v的附带损伤定义为v与其他非目标激活方向的二阶矩加权内积。利用大量无害上下文中的激活样本估计经验二阶矩矩阵，然后在约束优化框架下最小化附带损伤。COAST的优化目标为：min ||v||²_M = v^T M v, subject to v^T d ≥ 1，其中M为二阶矩矩阵。解法为带约束的二次规划闭式解。实验涵盖Llama、Gemma等多模型，比较ActAdd、Angular Steering等基线。",

    abstract_cn: "SDCV（Sparse Autoencoder-Denoised Concept Vectors）针对现有线性概念向量方法（如线性探测、均值差法）的一个核心局限：这些方法在构建概念方向时，不可避免地引入来自数据集中多样样本的噪声特征。这些噪声特征在steering过程中产生不必要的副作用——它们改变的不是目标概念，而是无关的语义方向。SDCV利用稀疏自编码器的特征分离能力：将对比激活通过SAE编码为稀疏潜在表示后，仅保留与目标概念最相关的top-k个SAE潜在特征（通过潜在空间中的对比差异排名），然后将这些特征解码回残差流以构建'纯净'的概念向量。在六个挑战性概念上的实验表明，SDCV将steering成功率提升了4-16%（相比未经SAE处理的基线）。",
    methodology: "核心流程：(1) 训练SAE：在目标层训练TopK SAE；(2) 构建原始概念向量：使用均值差方法计算对比激活差异；(3) SAE编码：将原始概念向量通过SAE编码器编码为稀疏潜在表示；(4) 特征筛选：仅保留激活差异最大的top-k个SAE潜在特征（丢弃噪声特征）；(5) SAE解码：将筛选后的稀疏潜在表示通过SAE解码器还原为'去噪'概念向量。实验覆盖六个概念：生物特性、毒性、形式性、正面情感、德语等。模型为Llama 3。",
    findings: "核心发现：(1) 未经SAE处理的线性概念向量确实包含大量噪声——仅top-k SAE特征就几乎保持了全部steering效果；(2) SDCV在六个概念上将steering成功率提升4-16%；(3) 保留的SAE特征数量（k）存在最优值——过少丢失信号，过多引入噪声；(4) SAE特征具有较好的概念特异性和可解释性；(5) 去噪后的概念向量在不同prompt上下文中的泛化性更好。",
    limitations: "局限性：(1) 依赖SAE的初始训练质量；(2) top-k选择策略（固定k或基于阈值的自适应k）的泛化性未知；(3) 仅测试了相对清晰的语义概念，更抽象或组合概念的去噪效果未验证；(4) 去噪操作本身的信息丢弃可能在某些情况下损失有效信号。",

    abstract_cn: "SAKE（Steering Activations for Knowledge Editing）将知识编辑从'单prompt修改'升级为'分布级编辑'。传统知识编辑方法（如ROME、MEMIT）在某一个prompt上修改事实后，往往在释义变体和逻辑推论中表现不一致——即缺乏上下文鲁棒性和逻辑泛化性。SAKE通过最优传输（Optimal Transport）将待编辑的事实建模为一个分布（而非单个prompt），然后找到一种激活空间中的变换，使该分布的关键activation pattern从旧事实平滑迁移到新事实。这种方法在EVOKE、COUNTERFACT、MQuAKE等多个知识编辑基准上表现出更强的鲁棒性和泛化性。",

    findings: "核心发现：(1) 分布级编辑的鲁棒性显著优于单prompt编辑——在释义测试中准确率提升尤为明显；(2) OT-based方法可以隐式地捕获事实的'逻辑邻域'——与目标事实逻辑相关的查询也会被一致地更新；(3) 编辑通常仅需干预少数几层的激活即可生效；(4) 方法的副作用（对其他事实的影响）可控——OT映射的正则化有助于保持无关事实的激活不变；(5) 相比权重编辑方法，激活编辑更轻量但持久性不足。",

    abstract_cn: "REACT提出了一个两阶段的知识编辑框架，旨在提高编辑的泛化性并减少过拟合。在第一阶段（Representation Extraction），使用定制的刺激模板激活目标知识，通过主成分分析（PCA）和可学习的线性变换从激活模式中提取'信念偏移'（belief shift）向量——该向量编码了从旧知识到新知识的表征变化方向。在第二阶段（Controllable Tuning），将信念偏移向量以受控方式注入隐藏状态，注入强度由一个预训练的分类器动态门控——该分类器判断当前上下文是否需要应用编辑。两阶段设计的核心优势在于将知识编辑的'what to change'和'when to apply'解耦。在EVOKE、COUNTERFACT和MQuAKE基准上，REACT显著减少了过拟合（编辑仅在目标上下文中生效），同时保持良好的泛化性。",
    methodology: "两阶段架构：(1) 表征提取阶段——设计专门的刺激模板（直接提问+释义+否定形式）来激发目标知识的激活模式，通过PCA降维后在低维空间中学习新旧知识之间的仿射映射；(2) 可控调谐阶段——训练一个分类器来检测上下文是否属于目标知识的应用范围，分类器的输出作为门控信号控制信念偏移向量的注入强度。使用基于KL散度的正则化项约束编辑对无关上下文的影响。实验在多个标准基准上评估。",

    abstract_cn: "本文首次为表征工程（RepE）的有效性提供了理论解释。此前RepE虽然有大量成功的实证演示，但缺乏对其'为什么有效'的理论理解。作者将RepE的成功归因于神经网络中跨层激活模式的一个数学特性：每一层的激活矩阵（聚合多个样本）的主特征向量（principal eigenvector）在相邻层之间表现出高度稳定性。这种跨层激活稳定性确保了在一个层上构建的steering方向可以在其他层（通过适当的线性变换）仍然有效。论文在Vision-Language Models（CLIP、BLIP等）上进行了理论推导和实证验证，展示了这一理论可以解释包括跨层干预有效性、steering方向的可迁移性、以及不同概念间干扰模式在内的多个实证现象。",

    abstract_cn: "SRA（Surgical Refusal Ablation）解决了标准refusal vector消融的一个根本问题：从对比提示中提取的原始refusal方向是多语义的——它缠结了拒绝行为、核心能力、文本风格等多个维度的信息。直接消融这个方向会导致严重的附带损伤和能力漂移。SRA通过以下步骤实现'外科手术式'精确消融：(1) 定义保护'概念原子'（Concept Atoms）——需要保持的核心能力方向（如推理能力）和风格方向；(2) 使用岭正则化谱残差化（ridge-regularized spectral residualization）将refusal方向对这些保护方向进行正交化；(3) 仅消融正交化后的残余refusal成分。引入'幽灵噪声（Ghost Noise）'概念——来自不洁refusal方向的谱泄漏进入能力子空间的现象。在Qwen3-VL和Ministral模型上的实验显示，SRA实现0-2%拒绝率，perplexity影响ΔPPL≈0.02，KL散度从标准消融的2.088降至0.044。",

// ═══════════════════════════════ TAB SWITCHING ══════════════════════
function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'graph') initGraph();
    });
  });
}

// ═══════════════════════════════ FILTERS ═══════════════════════════
function initFilters() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.filter === activeFilter) {
        activeFilter = 'all';
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
      } else {
        activeFilter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
      filterCards();
    });
  });
}

function filterCards() {
  const query = document.getElementById('search').value.toLowerCase();
  const filtered = PAPERS.filter(p => {
    const matchesFilter = activeFilter === 'all' || p.priority === activeFilter ||
      (activeFilter === '2026' && p.year === 2026) ||
      (activeFilter === '2025' && p.year === 2025) ||
      (activeFilter === '2024' && p.year <= 2024);
    const matchesSearch = !query ||
      p.title.toLowerCase().includes(query) ||
      p.authors.toLowerCase().includes(query) ||
      p.tags.some(t => t.toLowerCase().includes(query)) ||
      p.summary_cn.toLowerCase().includes(query);
    return matchesFilter && matchesSearch;
  });
  renderCards(filtered);
}

      <div class="card-title">${p.title}</div>

      <div class="card-summary">${p.summary_cn}</div>

function initGraph() {
  if (graphNetwork) return;

  // Helper: extract core conclusion label from summary_cn
  function getConclusionLabel(p) {
    let text = p.summary_cn || '';
    // Take first sentence (split by 。!? and take first)
    const match = text.match(/^[^。！？]*[。！？]/);
    if (match) text = match[0];
    // Truncate to 35 chars
    if (text.length > 35) text = text.substring(0, 34) + '…';
    // Remove trailing punctuation for cleaner look
    text = text.replace(/[。！？，]$/, '');
    return `${p.id}\n${text}`;
  }

  const nodes = PAPERS.map((p, i) => ({
    id: p.id,
    label: getConclusionLabel(p),
    title: `<strong>${p.title}</strong><br><em>${p.authors}</em><br><br>${p.summary_cn}`,
    color: {
      background: p.priority === 'must' ? '#16a34a' : p.priority === 'important' ? '#d97706' : '#9ca3af',
      border: p.priority === 'must' ? '#15803d' : p.priority === 'important' ? '#b45309' : '#6b7280'
    },
    font: { color: '#1a1f2e', size: 9, face: 'Sora' },
    size: p.priority === 'must' ? 26 : p.priority === 'important' ? 20 : 14,
    borderWidth: 1.5,
  }));

  const edgeMap = {};
  const edges = [];
  const edgeColors = {
    cites: { color: '#6366f1', dashes: false },
    extends: { color: '#0d9488', dashes: false },
    contradicts: { color: '#dc2626', dashes: true },
    shares: { color: '#d97706', dashes: false },
    empirical: { color: '#7c3aed', dashes: true },
    philosophical: { color: '#ea580c', dashes: true }
  };

  PAPERS.forEach(p => {
    if (!p.relations) return;
    p.relations.forEach(r => {
      const key = `${p.id}->${r.target}`;
      if (!edgeMap[key]) {
        edgeMap[key] = true;
        edges.push({
          from: p.id,
          to: r.target,
          label: r.label,
          ...(edgeColors[r.type] || edgeColors.cites)
        });
      }
    });
  });

  const container = document.getElementById('graph-container');
  graphData = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
  graphNetwork = new vis.Network(container, graphData, {
    physics: { solver: 'forceAtlas2Based', forceAtlas2Based: { gravitationalConstant: -30, centralGravity: 0.005, springLength: 150 } },
    edges: { smooth: { type: 'continuous' }, font: { size: 8, color: '#7a8aa2', face: 'Sora' } },
    interaction: { hover: true, tooltipDelay: 200 },
  });

  graphNetwork.on('click', function(evt) {
    if (evt.nodes.length > 0) openPaper(evt.nodes[0]);
  });
}

// ═══════════════════════════════ GRAPH CONTROLS ═════════════════════
function initGraphControls() {
  document.getElementById('graph-zoom-in').addEventListener('click', () => {
    if (graphNetwork) graphNetwork.moveTo({ scale: graphNetwork.getScale() * 1.4 });
  });
  document.getElementById('graph-zoom-out').addEventListener('click', () => {
    if (graphNetwork) graphNetwork.moveTo({ scale: graphNetwork.getScale() / 1.4 });
  });
  document.getElementById('graph-reset').addEventListener('click', () => {
    if (graphNetwork) graphNetwork.fit({ animation: true });
  });
  document.getElementById('graph-fullscreen').addEventListener('click', toggleFullscreen);

  // Escape to exit fullscreen
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && isFullscreen) toggleFullscreen();
  });
}

function toggleFullscreen() {
  const container = document.getElementById('graph-container');
  const toolbar = document.getElementById('graph-toolbar');
  const btn = document.getElementById('graph-fullscreen');

  if (!isFullscreen) {
    container.classList.add('fullscreen');
    toolbar.classList.add('fullscreen');
    btn.textContent = '✕ 退出';
    isFullscreen = true;
  } else {
    container.classList.remove('fullscreen');
    toolbar.classList.remove('fullscreen');
    btn.textContent = '⛶ 全屏';
    isFullscreen = false;
    // Re-trigger fit since layout changed
    if (graphNetwork) setTimeout(() => graphNetwork.fit({ animation: false }), 100);
  }
}

// ═══════════════════════════════ NOTES ═════════════════════════════
function renderNotes() {
  const list = document.getElementById('notes-list');
  if (!NOTES || NOTES.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text-muted)">暂无阅读笔记。检索完成后将为核心论文撰写笔记。</div>`;
    return;
  }
  list.innerHTML = NOTES.map(n => `
    <div class="note-card">
      <h4>${n.title}</h4>
      <div class="note-meta">${n.paper_id} · ${n.date || ''}</div>
      <p>${n.content}</p>
    </div>
  `).join('');
}

function updateStats() {
  document.getElementById('paper-count').textContent = PAPERS.length;
  document.getElementById('must-count').textContent = PAPERS.filter(p => p.priority === 'must').length;
  document.getElementById('note-count').textContent = NOTES ? NOTES.length : 0;
}
</script>
</body>
</html>
