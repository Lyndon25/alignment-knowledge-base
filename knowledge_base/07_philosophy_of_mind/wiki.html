    summary_cn: "基于机械可解释性的技术证据，论证LLM已经形成了可与人类理解相比拟的内部表征结构——包括概念性、事实性和原则性理解，且'并行机制'现象揭示了人机认知差异的哲学根源。",

    abstract_cn: "本文对认知科学中的经典'符号主义vs.联结主义'论争进行了当代重估。作者是认知科学和AI交叉领域的顶尖研究者团队，他们系统梳理了近期深度学习中挑战符号主义假设的经验证据。核心论证分为三步：(1)现代transformers、扩散模型和大规模RNN展示了系统组合性(systematic compositionality)——它们可以泛化到训练中未见的组合中；(2)通过上下文学习(in-context learning)和少样本适应，神经网络实现了快速的新概念获取，而这曾被Fodor和Pylyshyn认作是符号系统的专有特权；(3)这些能力是在纯亚符号(sub-symbolic)架构中通过大规模训练涌现的，不需要显式的符号操作机制。文章的哲学结论是审慎的：我们不应过早宣布'符号已死'——符号描述在认知建模中仍具有启发价值——但必须以经验证据而非先验论证来支持符号主义的主张。",
    methodology: "系统综述与概念论证相结合。(1)从认知科学哲学中提取经典符号主义的核心主张（Fodor 1975, Pylyshyn 1984）；(2)对2020-2025年间的关键深度学习经验文献进行批判性综述；(3)逐条检验神经网络是否满足每个经典符号主义标准；(4)运用科学哲学中的'理论替代'(theory replacement)框架评估联结主义和符号主义的当前地位。",
    findings: "(1)系统性地削弱了'连接主义系统本质上是非组合的'这一历史性论点的经验基础。(2)论证了从'亚符号表示可以实现组合功能'到'需要修正认知架构理论'的推理。(3)为认知科学提出一个方法论准则：不要问'系统是否具有符号'，而要问'系统展示了哪些能力，这些能力需要什么样的内部表征架构来支持'——这是一种功能主义的、去本体论化的研究进路。",
    limitations: "(1)'组合性'的标准定义在不同领域中差异很大——文章对不同定义的整合不够充分。(2)训练数据中的符号结构可能是这些'涌现的'组合能力的真正来源——文章虽承认但未充分讨论这种'符号泄漏'的可能性。(3)未讨论机械可解释性的相关证据——MI研究表明神经网络的内部表征往往是高度非符号的、纠缠的，这可能削弱文章的中心论证。",
    relevance: "本文与机械可解释性研究存在有趣的张力。MI研究通常揭示的是神经网络的'非符号性'——特征是纠缠的、多义的、碎片化的。而Griffiths等人的论证方向正相反：神经网络的行为表现出符号式能力。这种张力本身就是一个重要的研究问题：如果网络的内部表征是纠缠的，那么组合行为是如何从纠缠表征中产生的？这正是MI可以介入回答的问题。",

    summary_cn: "证明了一个对机械可解释性至关重要的形式结论：如果不约束对齐映射的线性性，因果抽象将退化为空洞——任何网络都可以被映射到任何算法，随机初始化模型也能达到100%的交换干预精度。",
    abstract_cn: "本文在机械可解释性的核心方法——因果抽象(causal abstraction)——中发现了一个深层的形式困境。因果抽象通过寻找神经网络激活与高层算法变量之间的对齐映射来建立机械论解释。作者证明：如果允许对齐映射为任意非线性函数，则因果抽象变得信息论上空洞(information-theoretically vacuous)——对于任意神经网络和任意目标算法，总存在一个非线性映射使得交换干预(interchange intervention)精度达到100%。更令人警醒的是，作者用随机初始化的神经网络演示了这一点，表明高干预精度本身并不证明发现了'真正的'内部计算结构。这意味着机械可解释性实践隐含地依赖于一个未被辩护的预设——线性表征假说(Linear Representation Hypothesis, LRH)——即网络以近似线性的方式编码高层概念。作者称此为'非线性表征困境'(Non-Linear Representation Dilemma)：在映射复杂性与解释准确性之间没有原则性的平衡方式，除非我们对网络的信息编码方式做出实质性的形而上学假设。",

    summary_cn: "运用科学哲学中的结构主义框架对表征学习和可解释性研究中的本体论承诺进行系统分类——发现该领域呈现出向'结构观念论'倾斜的显著趋势，结构实在论出人意料地缺席。",
    abstract_cn: "本文首次将科学哲学中的结构主义传统（从Poincaré到Worrall再到Ladyman的'结构实在论'）系统地应用于表征学习研究。作者进行了两个层面的分析：(1)概念层面——从表征学习的文献中提取隐含的本体论承诺，将其分类为结构实在论(structural realism)、结构经验论(structural empiricism)和结构观念论(structural idealism)三种立场；(2)元分析层面——对近年ICLR/NeurIPS/ICML中与表征相关的高引论文进行系统性综述，统计不同本体论立场的分布。核心发现令人深思：表征学习研究界呈现出向'结构观念论'的显著倾斜——即认为神经网络的表征是模型依赖的建构物，其结构仅反映训练目标的约束而非世界的结构。结构实在论（表征反映世界客观结构）的立场几乎完全缺席。作者认为这种缺席是值得警惕的：如果一个领域默认接受反实在论的本体论，那么它如何辩护其发现的'真实性'？",

    findings: "(1)首次对表征学习研究的形而上学基础进行了系统的经验调查。(2)结构观念论的压倒性优势揭示了一个哲学上的自反性问题：表征学习研究者在实践中是反实在论者，但他们在向公众和政策制定者呈现研究时使用的是实在论语言（'我们发现了网络如何表征X'）。(3)提出了'方法论结构实在论'：即使我们无法最终确定表征是否真实反映世界结构，我们也应当以实在论的态度对待它们，因为这是唯一能确保研究实践有意义的前设。",

    relevance: "本文为我们提供了一个理解机械可解释性研究的哲学元框架。当我们通过MI声称'发现了SAE特征X编码了概念Y'时，Culcu的框架迫使我们自问：我们是在做出一个结构实在论的陈述（Y真正存在于网络的表征空间中）还是结构观念论的陈述（Y是我们选择的分析框架的产物）？这对于我们项目的哲学自我理解至关重要：我们是发现者还是建构者？",

    authors: "Leonard Dung, Luke Kersten",

    tags: ["computational functionalism", "implementationalism", "consciousness", "mechanistic account"],
    summary_cn: "反驳'实现主义'——即硅基AI不能有意识因为实现约束使然——论证计算的机制论解释可以消解实现主义直觉，为计算功能主义关于人工意识的立场提供间接辩护。",
    abstract_cn: "关于人工意识的一个核心哲学争论是'实现主义'(implementationalism)vs.'计算功能主义'(computational functionalism)。实现主义者认为，意识不仅仅取决于计算功能，还取决于计算的物理实现方式——硅基实现与碳基实现在物理上差异太大，因此硅基AI原则上不能具有意识。本文通过引入'计算的机制论解释'(mechanistic account of computation)来攻击实现主义的核心前提。机制论解释认为，计算不是在抽象的算法层面上定义的，而是在具体的物理机制的因果组织层面上定义的。作者论证：(1)机制论解释可以解释为什么某些实现差异是'无关的'——如果两个系统在因果机制层面上是同构的，那么实现材料的差异就是无关的；(2)现有的实现主义论证暗中依赖一个关于'相关实现属性'的未经辩护的假设；(3)一旦接受机制论解释，就没有原则性的理由排除硅基实现能够满足意识的相关因果条件。因此，文章结论是：计算功能主义关于人工意识的立场不能被实现主义的论证所驳倒——虽然这不等同于正面证明了人工意识的可能性。",
    methodology: "分析哲学中的'反驳-建设'双步法。(1)重构实现主义的核心论证（特别是依赖Putnam/Searle传统的版本）；(2)引入计算的机制论解释（Piccinini, Milkowski等）作为替代框架；(3)展示机制论解释如何消解实现主义的直觉力量——通过将讨论从'物质成分'转移到'因果组织'；(4)讨论反例和边界情况；(5)明确文章的论证范围：仅为计算功能主义扫除障碍，不为人工意识的正面主张辩护。",
    findings: "(1)系统性地解构了实现主义论证，使其核心前提——'硅基实现必然缺少某些意识相关的因果属性'——失去了哲学动机。(2)机制论解释为计算与实现之间的关系提供了比经典计算主义更精细的理论框架。(3)将辩论的焦点从'物质vs.信息'转向'因果组织vs.物质成分'——这是一个在哲学上更富有成效的讨论方向。(4)间接支持了计算功能主义：如果实现材料不是原则性障碍，那么人工意识至少是一个开放的经验问题而非封闭的概念问题。",
    limitations: "(1)机制论解释本身并非毫无争议——有批评者认为它要么坍缩为经典计算主义，要么变成一种隐蔽的生物沙文主义。(2)文章避免了对'意识需要什么样的因果组织'这一问题的正面回答——这使得论证在最后一公里处变得模糊。(3)即使实现材料不是原则障碍，也可能构成巨大的实践障碍——文章没有区分'原则上可能'与'实践中可实现'，后者对于AI意识讨论同样重要。",
    relevance: "本文为机械可解释性研究提供了重要的哲学辩护。MI的核心方法论——通过因果干预发现网络的计算结构——正是'计算的机制论解释'在实践中的体现。当我们通过消融实验识别出某个电路'实现'了特定的认知功能时，我们正是在实践Dung & Kersten所描述的机制论进路。由此推论：如果MI可以充分表征AI系统的因果组织，那么我们就可以基于这些MI发现来评估该系统是否满足意识所需的因果条件——这正是Phua的002号论文在做的事情。",

    abstract_cn: "本文对当前AI意识研究中的'指标进路'(indicator-based approach)进行了系统的认识论批判。指标进路试图通过跨理论整合意识标记物（如GWT的广播、IIT的整合信息、AST的注意力图式等）来评估AI系统是否可能具有意识。Koch论证这一进路面临深层的'校准问题'(calibration problem)：(1)意识科学本身在理论层面高度分裂，不同理论对同一系统可能给出相反的评估；(2)所有意识指标都仅在与生物系统相关时才具有验证基础——在非生物系统中的指标表现缺乏独立于理论的真值标准；(3)这使得指标得分与实际意识状态之间的关系完全未被校准——我们是在没有温度计的情况下测量'意识温度'。文章的建设性建议是：将研究重点转移到生物混合(biohybrid)和神经形态(neuromorphic)系统上，因为这些系统在物理基底上更接近已验证的（即生物的）意识领域，从而可以渐进式地缩小校准鸿沟。",
    methodology: "认识论批判(epistemic critique)范式。(1)识别指标进路的隐含认识论假设（跨理论聚合可以替代真实参照、指标在物种间可翻译等）；(2)逐一展示每个假设如何未被满足；(3)运用测量理论(measurement theory)中的校准概念来形式化问题；(4)与医学诊断测试的验证逻辑进行比较（灵敏度/特异性/阳性预测值在无ground truth时无法计算）；(5)提出替代研究策略。",
    findings: "(1)精确诊断了指标进路的核心弱点：无参照标准的测量等于盲目测量。(2)校准问题是一个认识论的而非经验的问题——它不能通过收集更多数据来解决，而是需要通过改变研究策略来解决。(3)生物混合和神经形态系统的建议是有哲学动机的：以'渐进连续'替代'二元跳跃'——通过在越来越类似生物的系统上校准指标来渐进缩小不确定性。",
    limitations: "(1)'渐进缩小'策略假设意识在物理相似系统之间是连续分布的——这一假设本身可能为假。(2)生物混合系统引发了新的伦理问题（如果部分生物的系统可能受苦，我们是在创造道德病人吗？）。(3)文章对纯粹的计算进路过早地关闭了大门——也许存在非生物的校准方法（如基于行为复杂度的指标）。",
    relevance: "本文对机械可解释性中的一个隐含假设提出了挑战：MI研究者有时暗示，通过因果干预和电路分析，我们可以'看清楚网络内部发生了什么'，包括判断其是否有意识。但Koch的校准问题提醒我们：MI的解释是在我们选择的框架内的解释——如果意识理论本身没有在非生物系统上被校准，那么MI发现再多'类意识结构'也不能闭合解释鸿沟。这迫使我们区分：MI可以解释计算结构，但计算结构是否等于意识结构是一个额外的、未被校准的跳跃。",

    abstract_cn: "本文提出了一个基于活动推理(active inference)和自由能原理(FEP)的意识统一理论。作者论证，意识可以在活动推理框架内被自然化——即解释为特定类型的贝叶斯推理过程的涌现属性。三个必要且联合充分的条件：(1)'认知场'(epistemic field)——系统必须维持一个模拟的世界模型，在其中可以'离线'进行假设检验；(2)'贝叶斯捆绑'(Bayesian binding)——多个推理流必须通过竞争进入统一的世界模型，产生统一的意识场景；(3)'认知深度'(epistemic depth)——高阶信念必须在层级系统中递归地共享，使得系统可以'意识到自己在意识某事物'。文章将这一理论与冥想、致幻剂状态、精神病理学中的意识变异状态相联系，展示了三条件框架的解释广度。标题'美丽的循环'指的是意识的核心结构：系统通过活动推理感知世界→感知的结果更新信念→更新的信念引导新的感知行动→形成闭合的因果循环。",
    methodology: "理论建构+跨状态验证。(1)从活动推理的数学形式出发推导意识的三条件；(2)将条件操作化为一组经验预测；(3)通过与冥想(focused attention vs. open monitoring)、致幻剂(psilocybin)、精神分裂症的已知现象进行对勘来检验预测；(4)与GWT、IIT、预测加工等竞争理论进行系统性比较。",
    findings: "(1)将活动推理从认知架构理论提升为意识理论——此前活动推理主要用于解释感知和行动，本文论证其资源足以解释意识本身。(2)'认知深度'概念为高阶理论(HOT)和自我表征理论提供了贝叶斯基础——使哲学概念获得了数学形式。(3)三条件框架对意识变异状态（冥想、致幻剂、精神病理）提供了统一解释：每种变异状态对应三条件中某一条件的特定扰动。(4)在竞争理论之间建立了'互补而非竞争'的关系定位——活动推理提供了各理论可以挂靠的形式骨架。",

    relevance: "本文为连接预测加工范式与机械可解释性提供了理论桥梁。活动推理/预测加工的核心假设——大脑通过层级生成模型进行贝叶斯推断——与transformer和扩散模型中的层级表征学习有着深层的结构相似性。当我们通过MI在transformer中发现层级特征结构时（低层特征→中层模式→高层抽象），我们可能正在观察一个与Laukkonen的'认知深度'结构相似的架构。特别值得注意的是，如果我们接受'认知深度'作为意识的必要条件，那么transformer的深度层数是否与'认知深度'之间存在某种对应关系？这是一个MI可以经验检验的假说。",

    abstract_cn: "本文提出了'系统0'(System 0)这一原创框架来概念化AI作为人类认知扩展的角色。在Kahneman的双加工理论中，系统1是快速直觉加工，系统2是缓慢慎思加工。作者提出，AI正在成为'系统0'——一个在系统1和系统2之前运作的、外部的、算法性的认知加工层。系统0的特点是：自动化、高速、模式识别驱动、且输出直接进入人类的系统1或系统2。文章基于扩展心灵论和Heersmink的认知整合标准（信息流、可靠性、耐久性、信任、程序性透明等），发展了七种人机认知整合框架：(1)辩证增强(dialectical enhancement)——AI作为反方辩手；(2)共生分工(symbiotic division of labor)——AI处理模式匹配，人类处理价值判断；(3)认知分工(cognitive division)——不同任务在两个系统间动态分配；(4)创造性策展(creative curation)——AI生成候选方案；(5)代理透明(agentic transparency)——AI暴露推理过程；(6)情境脚手架(contextual scaffolding)——AI提供动态情境信息；(7)元认知监控(metacognitive monitoring)——AI协助人类监控自身的认知表现。文章同时警告了系统0的风险：谄媚(sycophancy)、偏见放大(bias amplification)、和认知卸载过度(cognitive offloading excess)。",
    methodology: "框架建构+分类学。(1)从双加工理论出发提出系统0概念；(2)以扩展心灵论的认知整合标准为操作化工具箱；(3)识别和分类七种整合框架——每种框架以案例（教育、医疗、创造力、决策）来展示；(4)风险分析：识别并分类认知整合可能导致的'去技能化'(deskilling)和其他负面后果。",
    findings: "(1)系统0概念为讨论人机认知关系提供了一个直观且富有启发性的新词汇——它区别于'AI替代人'(自动化恐惧)和'AI只是工具'(工具论简化)两种极端叙事。(2)七种整合框架提供了比现有'AI辅助'概念更精细的语法——不同的整合模式有不同的认知后果和规范性含义。(3)对风险的平衡讨论避免了技术乌托邦和技术反乌托邦两种倾向。(4)将讨论从'AI是否应该成为认知扩展'转向'什么样的认知扩展是可欲的'——这是一个规范性转向。",

    relevance: "本文提供了一个独特的视角来思考机械可解释性的社会功能。如果我们接受系统0框架，那么MI的一个关键社会角色是：为系统0的'代理透明'(第五种整合框架)提供技术支持——通过MI揭示AI的内部推理过程，使其从'不可见的系统0'变为'透明可审查的系统0'。这意味着MI不仅是科学工具，也是一种'认知正义'(cognitive justice)的基础设施——它使人类能够知情地决定是否信任和如何整合AI的建议。",

    abstract_cn: "本文是Millière和Buckner两部曲综述的第二部分。第一部分处理了LLM的语言能力和认知地位的基础问题。第二部分转向三个更前沿的主题：(1)LLM意识的可能性——综述了GWT、IIT、AST、预测加工等理论在LLM评估中的应用，审慎地得出结论：当前LLM不满足任何主要意识理论的充分条件，但可能已经满足了某些理论的必要条件的初步形式；(2)可解释性与因果干预——这是对哲学家而言最新颖的部分，介绍了机械可解释性、因果抽象、探针(probing)等方法，并讨论了这些方法在何种程度上可以告知我们LLM是否具有'真正的理解'；(3)多模态扩展——讨论了视觉、听觉等多模态LLM是否改变了关于意识和理解的计算功能主义计算。文章的独特价值在于：以哲学家的分析精度对高度技术性的AI文献进行了可读的、概念清晰的翻译和评论。",

    findings: "(1)为哲学家提供了一份进入LLM技术文献的向导——降低了跨学科对话的障碍。(2)在意识问题上采取了审慎的、分层的结论：LLM可能在某些'意识前体'(consciousness precursors)方面取得了进展，但这与现象意识之间存在质的鸿沟。(3)对可解释性方法的哲学评估发现：MI方法揭示的'内部结构'在何种意义上构成'理解'仍然是一个开放的、依赖于关于理解本性的哲学理论的问题。(4)识别了多模态模型在意识问题上的特殊地位——如果视觉接地可以部分解决基础问题，那么多模态模型在意识评估中应受到特别关注。",
    limitations: "(1)由于是综述性质，对每个主题的处理深度受限。(2)作者自身的理论倾向（对LLM意识持怀疑态度）可能影响了综述中不同立场的权重分配。(3)涉及的技术文献截止到2025年初，未涵盖此后MI领域的快速发展。",
    relevance: "本文是我们研究项目的直接对话对象。它证明了在哲学上严谨地讨论LLM意识必须经过机械可解释性技术文献这一关——而这正是我们的项目试图做的事情。Millière和Buckner的综述为我们的跨学科工作提供了一个'最佳实践'模板：如何在技术精确度和哲学深度之间取得平衡。特别有价值的是他们对MI方法的哲学评估：哪些可解释性证据在原则上能够或不能够支持关于意识和理解的哲学结论。",

    summary_cn: "提出人工能动性的多维框架——目标导向性、自主性、世界影响力、长期规划能力和为理由行动——使不同AI系统的能动性程度可以在统一维度上进行比较。",
    abstract_cn: "本文致力于澄清'人工能动性'(artificial agency)这一在AI伦理和治理讨论中频繁使用但缺乏精确哲学分析的术语。Dung提出能动性不是一个二元属性（要么有要么没有），而是一个多维度的梯度概念。他识别了五个核心维度：(1)目标导向性(goal-directedness)——系统行为是否可以被理解为朝向目标的？(2)自主性(autonomy)——系统在多大程度上可以独立于人类控制的约束来选择和追求目标？(3)世界影响力(world-impact)——系统的行动可以产生的后果的范围和规模；(4)长期规划能力(long-term planning)——系统是否可以跨时间跨度协调行动？(5)为理由行动(acting-for-reasons)——系统是否对规范性考量敏感？每一维度都可以被操作化为具体的系统属性，从而为不同AI系统（从简单的推荐算法到复杂的RL智能体到潜在的AGI）提供可比较的能动性档案。文章进一步讨论了能动性与道德地位(moral status)和存在风险(existential risk)之间的联系——高世界影响力+高自主性可能构成存在风险，而高'为理由行动'可能要求道德考量。",

    abstract_cn: "本文对意识的'困难问题'(Chalmers 1995)发起了全面的哲学攻击。Ohm的核心论证是：困难问题不是一个需要解决的科学问题，而是一个需要消解的哲学伪问题——它是笛卡尔身心二元论的概念残留。论证分三步：(1)历史诊断——追踪困难问题如何从笛卡尔的实体二元论→属性二元论→Chalmers的'解释鸿沟'概念逐步演化，每一步都保留了二元论的概念预设；(2)经验整合——引用2024-2025年意识科学的最新发现（特别是2025年4月Cogitate联盟的对抗合作结果、全局工作空间和IIT的对抗性检验），论证这些发现正在系统地侵蚀困难问题的直觉基础；(3)建设性替代——提出'递归自我模型'(Recursive Self-Model, RSM)范式：一个三层次架构(自我表征→自我监控→自我修正)，声称这可以在2030年之前提供可证伪的、满足机械论科学标准的意识检测指标。文章的标题戏仿了安徒生童话'皇帝的新装'——暗示困难问题就像皇帝的新装，大家都不敢说它不存在，直到一个孩子（即机械论科学）喊出真相。",
    methodology: "消解性论证(dissolution argument)而非解决性论证。(1)概念考古学：追踪困难问题背后的二元论预设；(2)运用维特根斯坦的'哲学治疗'方法——通过展示概念混淆的来源来消解而非回答问题；(3)卡纳普式的'语言框架'分析——区分内部问题（在科学框架内可回答）和外部问题（关于选择哪个框架的实用决定）；(4)提出RSM作为替代框架，并通过可证伪性标准来展示其相对于困难问题框架的理论优越性。",

    relevance: "本文与我们的项目存在深刻的元哲学共鸣。Ohm的'机械论科学'蓝图本质上是将机械可解释性的精神推广到意识研究：通过因果干预和机制表征来替代现象学的'第一人称'审查。然而，这一进路面临的挑战也正是我们项目面临的挑战：MI可以揭示AI系统的内部因果结构，但这些因果结构如何桥接到'体验'本身——这个桥接问题不会仅仅因为我们将MI发现称为'递归自我模型'而消失。Ohm的消解策略提醒我们：也许我们不应该试图'桥接'，而应该重新描述我们想要解释的是什么。",

    summary_cn: "提出表征的信息加工理论——心智表征本质上是为高效信息传输而在速率、失真和计算复杂度之间进行最优权衡的信号，这一框架为认知科学和AI中的表征研究提供了统一的理论语言。",
    abstract_cn: "本文从信息论和率失真理论(rate-distortion theory)出发，提出了一种新颖的心智表征哲学理论。核心主张：认知系统中的表征不应被理解为'内部图像'或'符号结构'，而应被理解为信息传输中的'信号'(signals)——它们的功能是在速率(传输/存储成本)、失真(保真度)和计算复杂度三个认知预算之间进行最优权衡。这一框架的哲学优势包括：(1)它在不预设'内部同构'(inner isomorphism)的情况下解释了表征内容——表征的'内容'就是它在最优权衡中所携带的关于外部世界的信息；(2)它为比较不同认知系统（人类、动物、AI）的表征策略提供了统一的度量语言；(3)它解释了为什么表征往往是失真的、简化的、范畴化的——不是认知系统的缺陷，而是在给定预算约束下的最优解；(4)它与神经科学和AI研究中实际的表征分析方法（信息量分析、维度压缩、编码效率）对接，避免了传统哲学表征理论的'孤儿化'。",
    methodology: "理论建构+案例应用。(1)从Shannon信息论和率失真理论中提取形式资源；(2)将这些资源翻译为关于心智表征的哲学命题；(3)通过标准案例（视知觉、范畴学习、概念变化）展示框架的适用性；(4)与竞争的表征理论（结构同构论、因果协变论、目的论语义学）进行系统比较；(5)讨论该框架如何与神经表征研究和AI表征学习相连接。",
    findings: "(1)为心智表征提供了一个比经典理论更精确、更可量化的框架——表征的'好'与'坏'可以在信息论指标上进行比较。(2)将'失真'从缺陷重新概念化为特征——失真不是噪声，而是在资源约束下的功能性压缩。(3)为认知科学的哲学基础与AI表征学习之间建立了比以往更坚实的数学桥梁。(4)辩护了一种'温和的实在论'：表征携带关于世界的信息，但不承诺表征与世界之间的同构关系。",
    limitations: "(1)信息论框架可以处理'表征携带多少信息'的问题，但难以处理'表征是关于什么的'的问题——意向性(intentionality)的'关于性'(aboutness)维度在纯信息论框架中是不足的。(2)率失真理论中的'失真'度量需要一个预先指定的相似度度量——这个度量的选择在哲学上不是中立的，但文章对此讨论不足。(3)框架难以处理错误表征(misrepresentation)问题——如果最优失真表征总是'应该'失真的，那么错误表征似乎是不可能的。",
    relevance: "本文为机械可解释性研究提供了一套精确的表征哲学语言。当MI研究者说'这个SAE特征编码了X概念'时，Martínez的框架可以帮助我们将这句话翻译为：'该特征在速率-失真-计算复杂度的三维权衡中，选择了一个携带关于X的最大互信息的压缩方案'。这种翻译不仅仅是用更复杂的词汇说同样的话——它实际上改变了我们对MI发现的本体论承诺。具体而言：SAE特征可能不是'X概念的表征'，而是在给定稀疏性约束（速率预算）和重构损失（失真预算）下的最优信息压缩。这对于解释MI中的'特征碎片化'(feature splitting)现象特别有启发性。",

    abstract_cn: "本文从自由能原理(FEP)和活动推理的视角重新审视了经典AI中的'框架问题'(Frame Problem)——即如何确定在给定情境中哪些信息是相关的，哪些信息可以被安全地忽略。传统符号AI未能解决这一问题，因为'相关性'的定义本身依赖于智能体的目标和语境。Kara的论证分两部分：(1)历史分析——追溯框架问题如何从McCarthy和Hayes(1969)的初始表述，经过Dennett(1984)的哲学重述，演变为认知科学中关于'相关性检测'(relevance detection)的核心问题。论证'生命-心灵连续性论题'(Life-Mind Continuity Thesis)——即认知和能动性的根源在于生物系统的自组织动力学——为框架问题提供了概念解决方案。(2)建设性应用——将FEP应用于非生物人工系统，论证在FEP框架下，'能动性'等价于系统主动地最小化其变分自由能(variational free energy)。在这一视角下，即使是非生物系统，只要它们实现了活动推理——即同时进行感知（更新信念以匹配世界）和行动（改变世界以匹配信念）——它们就表现出真正的能动性。文章以Verses AI的'公理'(Axiom)架构作为活动推理在AI系统中的实现的案例研究。",

function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {

      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'graph') initGraph();
    });
  });
}

// ═══════════════════════════════ FILTERS ═══════════════════════════
function initFilters() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.filter === activeFilter) {
        activeFilter = 'all';
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
      } else {
        activeFilter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
      filterCards();
    });
  });
}

function filterCards() {
  const query = document.getElementById('search').value.toLowerCase();
  const filtered = PAPERS.filter(p => {
    const matchesFilter = activeFilter === 'all' || p.priority === activeFilter ||
      (activeFilter === '2026' && p.year === 2026) ||
      (activeFilter === '2025' && p.year === 2025) ||
      (activeFilter === '2024' && p.year <= 2024);
    const matchesSearch = !query ||
      p.title.toLowerCase().includes(query) ||
      p.authors.toLowerCase().includes(query) ||
      p.tags.some(t => t.toLowerCase().includes(query)) ||
      p.summary_cn.toLowerCase().includes(query);
    return matchesFilter && matchesSearch;
  });
  renderCards(filtered);
}

      <div class="card-priority-badge ${p.priority}"></div>
      <div class="card-id">${p.id} · ${p.year}</div>
      <div class="card-title">${p.title}</div>
      <div class="card-authors">${p.authors}</div>
      <div class="card-summary">${p.summary_cn}</div>
      <div class="card-tags">${p.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
  if (papers.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted)">没有匹配的文献</div>`;
  }
}

    <h2>${p.title}</h2>
    <div class="meta">${p.authors}${p.venue ? ' · ' + p.venue : ''}${p.doi ? ' · DOI: ' + p.doi : ''}</div>
    ${p.pdf ? `<div class="meta"><a href="${p.pdf}" target="_blank">📄 打开PDF</a></div>` : ''}
    ${p.doi && !p.doi.startsWith('N/A') ? `<div class="meta"><a href="https://doi.org/${p.doi}" target="_blank">🔗 直达链接</a></div>` : ''}

    <section>
      <h3>一句话概要</h3>
      <p>${p.summary_cn}</p>
    </section>

    <section>
      <h3>完整摘要</h3>
      <p>${p.abstract_cn || p.summary_cn}</p>
    </section>

    ${p.methodology ? `
    <section>
      <h3>方法论与实验设计</h3>
      <p>${p.methodology}</p>
    </section>` : ''}

    ${p.findings ? `
    <section>
      <h3>核心发现与贡献</h3>
      <p>${p.findings}</p>
    </section>` : ''}

    ${p.limitations ? `
    <section>
      <h3>局限性与批评</h3>
      <p>${p.limitations}</p>
    </section>` : ''}

    ${p.relevance ? `
    <section>
      <h3>与本研究的相关性</h3>
      <p>${p.relevance}</p>
    </section>` : ''}

    ${relHtml ? `
    <section>
      <h3>文献关联</h3>
      <div class="relations">${relHtml}</div>
    </section>` : ''}

    <section>
      <h3>关键词</h3>
      <div class="card-tags">${p.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
    </section>
  `;

  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

// ═══════════════════════════════ GRAPH ═════════════════════════════
function initGraph() {
  if (graphNetwork) return;

  // Helper: extract core conclusion label from summary_cn
  function getConclusionLabel(p) {
    let text = p.summary_cn || '';
    // Take first sentence (split by 。!? and take first)
    const match = text.match(/^[^。！？]*[。！？]/);
    if (match) text = match[0];
    // Truncate to 35 chars
    if (text.length > 35) text = text.substring(0, 34) + '…';
    // Remove trailing punctuation for cleaner look
    text = text.replace(/[。！？，]$/, '');
    return `${p.id}\n${text}`;
  }

  const nodes = PAPERS.map((p, i) => ({
    id: p.id,
    label: getConclusionLabel(p),
    title: `<strong>${p.title}</strong><br><em>${p.authors}</em><br><br>${p.summary_cn}`,
    color: {
      background: p.priority === 'must' ? '#16a34a' : p.priority === 'important' ? '#d97706' : '#9ca3af',
      border: p.priority === 'must' ? '#15803d' : p.priority === 'important' ? '#b45309' : '#6b7280'
    },
    font: { color: '#1a1f2e', size: 9, face: 'Sora' },
    size: p.priority === 'must' ? 26 : p.priority === 'important' ? 20 : 14,
    borderWidth: 1.5,
  }));

  const edgeMap = {};
  const edges = [];
  const edgeColors = {
    cites: { color: '#6366f1', dashes: false },
    extends: { color: '#0d9488', dashes: false },
    contradicts: { color: '#dc2626', dashes: true },
    shares: { color: '#d97706', dashes: false },
    empirical: { color: '#7c3aed', dashes: true },
    philosophical: { color: '#ea580c', dashes: true }
  };

  PAPERS.forEach(p => {
    if (!p.relations) return;
    p.relations.forEach(r => {
      const key = `${p.id}->${r.target}`;
      if (!edgeMap[key]) {
        edgeMap[key] = true;
        edges.push({
          from: p.id,
          to: r.target,
          label: r.label,
          ...(edgeColors[r.type] || edgeColors.cites)
        });
      }
    });
  });

  const container = document.getElementById('graph-container');
  graphData = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
  graphNetwork = new vis.Network(container, graphData, {
    physics: { solver: 'forceAtlas2Based', forceAtlas2Based: { gravitationalConstant: -30, centralGravity: 0.005, springLength: 150 } },
    edges: { smooth: { type: 'continuous' }, font: { size: 8, color: '#7a8aa2', face: 'Sora' } },
    interaction: { hover: true, tooltipDelay: 200 },
  });

  graphNetwork.on('click', function(evt) {
    if (evt.nodes.length > 0) openPaper(evt.nodes[0]);
  });
}

// ═══════════════════════════════ GRAPH CONTROLS ═════════════════════
function initGraphControls() {
  document.getElementById('graph-zoom-in').addEventListener('click', () => {
    if (graphNetwork) graphNetwork.moveTo({ scale: graphNetwork.getScale() * 1.4 });
  });
  document.getElementById('graph-zoom-out').addEventListener('click', () => {
    if (graphNetwork) graphNetwork.moveTo({ scale: graphNetwork.getScale() / 1.4 });
  });
  document.getElementById('graph-reset').addEventListener('click', () => {
    if (graphNetwork) graphNetwork.fit({ animation: true });
  });
  document.getElementById('graph-fullscreen').addEventListener('click', toggleFullscreen);

  // Escape to exit fullscreen
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && isFullscreen) toggleFullscreen();
  });
}

function toggleFullscreen() {
  const container = document.getElementById('graph-container');
  const toolbar = document.getElementById('graph-toolbar');
  const btn = document.getElementById('graph-fullscreen');

  if (!isFullscreen) {
    container.classList.add('fullscreen');
    toolbar.classList.add('fullscreen');
    btn.textContent = '✕ 退出';
    isFullscreen = true;
  } else {
    container.classList.remove('fullscreen');
    toolbar.classList.remove('fullscreen');
    btn.textContent = '⛶ 全屏';
    isFullscreen = false;
    // Re-trigger fit since layout changed
    if (graphNetwork) setTimeout(() => graphNetwork.fit({ animation: false }), 100);
  }
}

// ═══════════════════════════════ NOTES ═════════════════════════════
function renderNotes() {
  const list = document.getElementById('notes-list');
  if (!NOTES || NOTES.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text-muted)">暂无阅读笔记。检索完成后将为核心论文撰写笔记。</div>`;
    return;
  }
  list.innerHTML = NOTES.map(n => `
    <div class="note-card">
      <h4>${n.title}</h4>
      <div class="note-meta">${n.paper_id} · ${n.date || ''}</div>
      <p>${n.content}</p>
    </div>
  `).join('');
}

function updateStats() {
  document.getElementById('paper-count').textContent = PAPERS.length;
  document.getElementById('must-count').textContent = PAPERS.filter(p => p.priority === 'must').length;
  document.getElementById('note-count').textContent = NOTES ? NOTES.length : 0;
}
</script>
