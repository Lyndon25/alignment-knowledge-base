<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__DOMAIN_NAME__ · 文献Wiki</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400;500;600&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.6/dist/dist/vis-network.min.css" rel="stylesheet">

  <style>
    :root {
      --bg-void: #06080f;
      --bg-primary: #0c0f1a;
      --bg-secondary: #12182a;
      --bg-tertiary: #1a2238;
      --bg-elevated: #222d4a;
      --text-primary: #dce3f0;
      --text-secondary: #8899bb;
      --text-muted: #556688;
      --text-faint: #334466;
      --border-subtle: rgba(68, 102, 153, 0.08);
      --border-medium: rgba(68, 102, 153, 0.18);
      --border-strong: rgba(68, 102, 153, 0.30);
      --c-priority-must: #4ade80;
      --c-priority-important: #fbbf24;
      --c-priority-ref: #64748b;
      --c-rel-cites: #818cf8;
      --c-rel-extends: #2dd4bf;
      --c-rel-contradicts: #f87171;
      --c-rel-shares: #f5a623;
      --c-rel-empirical: #a78bfa;
      --c-rel-philosophical: #fb923c;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'Sora', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --transition-base: 200ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg-void);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-medium);
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-title {
      font-family: var(--font-display);
      font-size: 1.25rem; color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .header-stats {
      display: flex; gap: 1.5rem;
      font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted);
    }
    .header-stat span { color: var(--text-primary); font-weight: 500; }

    /* Tab Navigation */
    .tab-nav {
      display: flex; gap: 0;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-medium);
      padding: 0 2rem;
    }
    .tab-btn {
      padding: 0.75rem 1.25rem;
      border: none; background: none;
      color: var(--text-muted); font-family: var(--font-body);
      font-size: 0.85rem; cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all var(--transition-base);
    }
    .tab-btn:hover { color: var(--text-secondary); }
    .tab-btn.active { color: var(--text-primary); border-bottom-color: var(--c-rel-cites); }

    /* Tab Content */
    .tab-content { display: none; padding: 2rem; }
    .tab-content.active { display: block; }

    /* Filters */
    .filters {
      display: flex; gap: 0.75rem; flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .filter-btn {
      padding: 0.35rem 0.85rem;
      border: 1px solid var(--border-medium); border-radius: 999px;
      background: transparent; color: var(--text-muted);
      font-family: var(--font-mono); font-size: 0.7rem;
      cursor: pointer; transition: all var(--transition-base);
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--text-secondary); color: var(--text-primary);
    }
    .filter-btn.priority-must.active { border-color: var(--c-priority-must); color: var(--c-priority-must); }
    .filter-btn.priority-important.active { border-color: var(--c-priority-important); color: var(--c-priority-important); }
    .filter-btn.priority-ref.active { border-color: var(--c-priority-ref); color: var(--c-priority-ref); }

    .search-input {
      padding: 0.35rem 1rem;
      background: var(--bg-secondary); border: 1px solid var(--border-medium);
      border-radius: 999px; color: var(--text-primary);
      font-family: var(--font-body); font-size: 0.8rem;
      width: 240px; outline: none;
    }
    .search-input:focus { border-color: var(--border-strong); }

    /* Card Grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
    }
    .card {
      background: var(--bg-primary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      cursor: pointer;
      transition: all var(--transition-base);
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      border-color: var(--border-strong);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .card.priority-must { border-left: 3px solid var(--c-priority-must); }
    .card.priority-important { border-left: 3px solid var(--c-priority-important); }
    .card.priority-ref { border-left: 3px solid var(--c-priority-ref); }

    .card-id {
      font-family: var(--font-mono); font-size: 0.65rem;
      color: var(--text-faint); margin-bottom: 0.5rem;
    }
    .card-title {
      font-size: 0.95rem; font-weight: 500;
      color: var(--text-primary); margin-bottom: 0.4rem;
      line-height: 1.35;
    }
    .card-authors {
      font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem;
    }
    .card-summary {
      font-size: 0.78rem; color: var(--text-secondary);
      line-height: 1.5; margin-bottom: 0.75rem;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-tags {
      display: flex; gap: 0.35rem; flex-wrap: wrap;
    }
    .card-tag {
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      background: var(--bg-tertiary); color: var(--text-muted);
      font-size: 0.65rem; font-family: var(--font-mono);
    }
    .card-priority-badge {
      position: absolute; top: 0.75rem; right: 0.75rem;
      width: 8px; height: 8px; border-radius: 50%;
    }
    .card-priority-badge.must { background: var(--c-priority-must); box-shadow: 0 0 6px var(--c-priority-must); }
    .card-priority-badge.important { background: var(--c-priority-important); box-shadow: 0 0 6px var(--c-priority-important); }
    .card-priority-badge.ref { background: var(--c-priority-ref); }

    /* Detail Panel (Modal) */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(6,8,15,0.85); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg-primary);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-lg);
      max-width: 780px; width: 90vw; max-height: 85vh;
      overflow-y: auto; padding: 2rem;
      position: relative;
    }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      width: 32px; height: 32px; border: 1px solid var(--border-medium);
      border-radius: 50%; background: transparent; color: var(--text-muted);
      font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all var(--transition-base);
    }
    .modal-close:hover { border-color: var(--f87171, #f87171); color: #f87171; }
    .modal h2 { font-family: var(--font-display); font-size: 1.4rem; margin-bottom: 0.5rem; }
    .modal .meta { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 1.5rem; }
    .modal section { margin-bottom: 1.25rem; }
    .modal section h3 {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin-bottom: 0.5rem;
    }
    .modal section p { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.7; }
    .modal .relations { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .modal .rel-badge {
      padding: 0.25rem 0.7rem; border-radius: 999px; font-size: 0.7rem;
      font-family: var(--font-mono);
    }
    .rel-badge.cites { background: rgba(129,140,248,0.15); color: var(--c-rel-cites); }
    .rel-badge.extends { background: rgba(45,212,191,0.15); color: var(--c-rel-extends); }
    .rel-badge.contradicts { background: rgba(248,113,113,0.15); color: var(--c-rel-contradicts); }
    .rel-badge.shares { background: rgba(245,166,35,0.15); color: var(--c-rel-shares); }

    /* Graph Container */
    .graph-container {
      width: 100%; height: 70vh;
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-lg);
      background: var(--bg-primary);
      overflow: hidden;
    }
    .graph-legend {
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      margin-top: 1rem; padding: 0.75rem 1rem;
      background: var(--bg-primary); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
    }
    .graph-legend-item {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.7rem; color: var(--text-muted);
    }
    .graph-legend-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }

    /* Reading Notes */
    .notes-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .note-card {
      background: var(--bg-primary); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); padding: 1.25rem;
    }
    .note-card h4 { font-size: 0.9rem; color: var(--text-primary); margin-bottom: 0.4rem; }
    .note-card .note-meta { font-size: 0.7rem; color: var(--text-faint); margin-bottom: 0.6rem; }
    .note-card p { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.6; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-void); }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

    a { color: var(--c-rel-cites); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">__DOMAIN_TITLE__</div>
    <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.15rem">__DOMAIN_SUBTITLE__</div>
  </div>
  <div class="header-stats">
    <div class="header-stat">文献 <span id="paper-count">0</span></div>
    <div class="header-stat">必读 <span id="must-count" style="color:var(--c-priority-must)">0</span></div>
    <div class="header-stat">笔记 <span id="note-count">0</span></div>
  </div>
</div>

<div class="tab-nav">
  <button class="tab-btn active" data-tab="browse">📋 浏览文献</button>
  <button class="tab-btn" data-tab="graph">🔗 关系图谱</button>
  <button class="tab-btn" data-tab="notes">📝 阅读笔记</button>
</div>

<!-- Tab: Browse -->
<div class="tab-content active" id="tab-browse">
  <div class="filters">
    <input class="search-input" id="search" placeholder="搜索标题/作者/关键词..." oninput="filterCards()">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn priority-must" data-filter="must">必读</button>
    <button class="filter-btn priority-important" data-filter="important">重要</button>
    <button class="filter-btn priority-ref" data-filter="ref">参考</button>
    <button class="filter-btn" data-filter="2026">2026</button>
    <button class="filter-btn" data-filter="2025">2025</button>
    <button class="filter-btn" data-filter="2024">≤2024</button>
  </div>
  <div class="card-grid" id="card-grid"></div>
</div>

<!-- Tab: Graph -->
<div class="tab-content" id="tab-graph">
  <div class="graph-container" id="graph-container"></div>
  <div class="graph-legend" id="graph-legend">
    <div class="graph-legend-item"><div class="graph-legend-dot" style="background:var(--c-priority-must)"></div> 必读</div>
    <div class="graph-legend-item"><div class="graph-legend-dot" style="background:var(--c-priority-important)"></div> 重要</div>
    <div class="graph-legend-item"><div class="graph-legend-dot" style="background:var(--c-priority-ref)"></div> 参考</div>
    <div class="graph-legend-item"><div class="graph-legend-dot" style="background:var(--c-rel-cites)"></div> 引用</div>
    <div class="graph-legend-item"><div class="graph-legend-dot" style="background:var(--c-rel-extends)"></div> 方法继承</div>
    <div class="graph-legend-item"><div class="graph-legend-dot" style="background:var(--c-rel-contradicts)"></div> 对立观点</div>
    <div class="graph-legend-item"><div class="graph-legend-dot" style="background:var(--c-rel-shares)"></div> 共享概念</div>
    <div class="graph-legend-item"><div class="graph-legend-dot" style="background:var(--c-rel-empirical)"></div> 经验基础</div>
    <div class="graph-legend-item"><div class="graph-legend-dot" style="background:var(--c-rel-philosophical)"></div> 哲学先导</div>
  </div>
</div>

<!-- Tab: Notes -->
<div class="tab-content" id="tab-notes">
  <div class="notes-list" id="notes-list"></div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.6/dist/vis-network.min.js"></script>
<script>
// ═══════════════════════════════ DATA ═══════════════════════════════
const PAPERS = __PAPERS_DATA__;
const NOTES = __NOTES_DATA__;
const DOMAIN_ID = '__DOMAIN_ID__';

// ═══════════════════════════════ INIT ═══════════════════════════════
let activeFilter = 'all';
let graphNetwork = null;
let graphData = null;

document.addEventListener('DOMContentLoaded', () => {
  renderCards(PAPERS);
  renderNotes();
  updateStats();
  initTabs();
  initFilters();
});

// ═══════════════════════════════ TAB SWITCHING ══════════════════════
function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'graph') initGraph();
    });
  });
}

// ═══════════════════════════════ FILTERS ═══════════════════════════
function initFilters() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.filter === activeFilter) {
        activeFilter = 'all';
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
      } else {
        activeFilter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
      filterCards();
    });
  });
}

function filterCards() {
  const query = document.getElementById('search').value.toLowerCase();
  const filtered = PAPERS.filter(p => {
    const matchesFilter = activeFilter === 'all' || p.priority === activeFilter ||
      (activeFilter === '2026' && p.year === 2026) ||
      (activeFilter === '2025' && p.year === 2025) ||
      (activeFilter === '2024' && p.year <= 2024);
    const matchesSearch = !query ||
      p.title.toLowerCase().includes(query) ||
      p.authors.toLowerCase().includes(query) ||
      p.tags.some(t => t.toLowerCase().includes(query)) ||
      p.summary_cn.toLowerCase().includes(query);
    return matchesFilter && matchesSearch;
  });
  renderCards(filtered);
}

// ═══════════════════════════════ CARD RENDERING ═════════════════════
function renderCards(papers) {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = papers.map(p => `
    <div class="card priority-${p.priority}" onclick="openPaper('${p.id}')">
      <div class="card-priority-badge ${p.priority}"></div>
      <div class="card-id">${p.id} · ${p.year}</div>
      <div class="card-title">${p.title}</div>
      <div class="card-authors">${p.authors}</div>
      <div class="card-summary">${p.summary_cn}</div>
      <div class="card-tags">${p.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
  if (papers.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted)">没有匹配的文献</div>`;
  }
}

// ═══════════════════════════════ MODAL ═════════════════════════════
function openPaper(id) {
  const p = PAPERS.find(x => x.id === id);
  if (!p) return;

  // Build relations HTML
  let relHtml = '';
  if (p.relations && p.relations.length > 0) {
    relHtml = p.relations.map(r =>
      `<span class="rel-badge ${r.type}">${r.label} → ${r.target}</span>`
    ).join('');
  }

  const html = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="card-priority-badge ${p.priority}" style="position:static;display:inline-block;margin-bottom:0.5rem"></div>
    <span style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);margin-left:0.5rem">${p.id} · ${p.year} · ${p.priority === 'must' ? '必读' : p.priority === 'important' ? '重要' : '参考'}</span>
    <h2>${p.title}</h2>
    <div class="meta">${p.authors}${p.venue ? ' · ' + p.venue : ''}${p.doi ? ' · DOI: ' + p.doi : ''}</div>
    ${p.pdf ? `<div class="meta"><a href="${p.pdf}" target="_blank">📄 打开PDF</a></div>` : ''}

    <section>
      <h3>一句话概要</h3>
      <p>${p.summary_cn}</p>
    </section>

    <section>
      <h3>完整摘要</h3>
      <p>${p.abstract_cn || p.summary_cn}</p>
    </section>

    ${p.methodology ? `
    <section>
      <h3>方法论与实验设计</h3>
      <p>${p.methodology}</p>
    </section>` : ''}

    ${p.findings ? `
    <section>
      <h3>核心发现与贡献</h3>
      <p>${p.findings}</p>
    </section>` : ''}

    ${p.limitations ? `
    <section>
      <h3>局限性与批评</h3>
      <p>${p.limitations}</p>
    </section>` : ''}

    ${p.relevance ? `
    <section>
      <h3>与本研究的相关性</h3>
      <p>${p.relevance}</p>
    </section>` : ''}

    ${relHtml ? `
    <section>
      <h3>文献关联</h3>
      <div class="relations">${relHtml}</div>
    </section>` : ''}

    <section>
      <h3>关键词</h3>
      <div class="card-tags">${p.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
    </section>
  `;

  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

// ═══════════════════════════════ GRAPH ═════════════════════════════
function initGraph() {
  if (graphNetwork) return;

  const nodes = PAPERS.map((p, i) => ({
    id: p.id,
    label: `${p.id}\n${p.title.substring(0, 30)}...`,
    color: {
      background: p.priority === 'must' ? '#4ade80' : p.priority === 'important' ? '#fbbf24' : '#64748b',
      border: p.priority === 'must' ? '#22c55e' : p.priority === 'important' ? '#f59e0b' : '#475569'
    },
    font: { color: '#dce3f0', size: 10 },
    size: p.priority === 'must' ? 28 : p.priority === 'important' ? 22 : 16,
  }));

  const edgeMap = {};
  const edges = [];
  const edgeColors = {
    cites: { color: '#818cf8', dashes: false },
    extends: { color: '#2dd4bf', dashes: false },
    contradicts: { color: '#f87171', dashes: true },
    shares: { color: '#f5a623', dashes: false },
    empirical: { color: '#a78bfa', dashes: true },
    philosophical: { color: '#fb923c', dashes: true }
  };

  PAPERS.forEach(p => {
    if (!p.relations) return;
    p.relations.forEach(r => {
      const key = `${p.id}->${r.target}`;
      if (!edgeMap[key]) {
        edgeMap[key] = true;
        edges.push({
          from: p.id,
          to: r.target,
          label: r.label,
          ...(edgeColors[r.type] || edgeColors.cites)
        });
      }
    });
  });

  const container = document.getElementById('graph-container');
  graphData = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
  graphNetwork = new vis.Network(container, graphData, {
    physics: { solver: 'forceAtlas2Based', forceAtlas2Based: { gravitationalConstant: -30, centralGravity: 0.005, springLength: 150 } },
    edges: { smooth: { type: 'continuous' }, font: { size: 8, color: '#8899bb' } },
    interaction: { hover: true, tooltipDelay: 200 },
  });

  graphNetwork.on('click', function(evt) {
    if (evt.nodes.length > 0) openPaper(evt.nodes[0]);
  });
}

// ═══════════════════════════════ NOTES ═════════════════════════════
function renderNotes() {
  const list = document.getElementById('notes-list');
  if (!NOTES || NOTES.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text-muted)">暂无阅读笔记。检索完成后将为核心论文撰写笔记。</div>`;
    return;
  }
  list.innerHTML = NOTES.map(n => `
    <div class="note-card">
      <h4>${n.title}</h4>
      <div class="note-meta">${n.paper_id} · ${n.date || ''}</div>
      <p>${n.content}</p>
    </div>
  `).join('');
}

function updateStats() {
  document.getElementById('paper-count').textContent = PAPERS.length;
  document.getElementById('must-count').textContent = PAPERS.filter(p => p.priority === 'must').length;
  document.getElementById('note-count').textContent = NOTES ? NOTES.length : 0;
}
</script>
</body>
</html>
